name: Refresh IPL standings

on:
  schedule:
    # Twice daily — 19:00 and 20:00 UTC = 00:30 and 01:30 IST.
    # IPL late matches end around 23:30 IST; we run after that window.
    - cron: "0 19 * * *"
    - cron: "0 20 * * *"
  # Allow manual run from the Actions tab
  workflow_dispatch: {}

permissions:
  # Needed for the action to push a commit back to the repo
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Scrape Wikipedia for latest standings
        run: pnpm scrape
      - name: Commit + push if changed
        run: |
          git config user.name "ipl-pulse-bot"
          git config user.email "bot@ipl-pulse.local"
          if [[ -n "$(git status --porcelain data/standings.json data/remaining.json)" ]]; then
            git add data/standings.json data/remaining.json
            git commit -m "chore(data): auto-refresh standings + remaining matches"
            git push
            echo "Pushed standings refresh."
          else
            echo "No changes."
          fi
